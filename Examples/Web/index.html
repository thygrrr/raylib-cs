<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>raylib-cs — browser examples</title>
    <link rel="modulepreload" href="./main.js"/>
    <link rel="modulepreload" href="./_framework/dotnet.js"/>
    <style>
        html, body { height: 100%; }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0.75rem;
            box-sizing: border-box;
            background: #1d1d1d;
            color: #eaeaea;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        h1 { font-size: 1.1rem; font-weight: 600; }
        #toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 0.25rem; }
        #examples { font-size: 1rem; padding: .3rem .5rem; }
        #viewport {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }
        canvas {
            border: 1px solid #444;
            display: block;
            flex: 0 0 auto;
            width: 960px;
            height: 540px;
            max-width: none;
            max-height: none;
            image-rendering: pixelated;
            background: #000;
        }
        #status { color: #888; font-size: .85rem; margin: 0; }
    </style>
</head>
<body>
    <h1>raylib-cs running in the browser (WebAssembly)</h1>
    <div id="toolbar">
        <label for="examples">Example:&nbsp;</label>
        <select id="examples"><option>loading…</option></select>
    </div>
    <div id="viewport">
        <canvas id="canvas" width="960" height="540" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>
    <div id="status">Initializing .NET + raylib…</div>

    <script type="module" src="./main.js"></script>
</body>
</html>
